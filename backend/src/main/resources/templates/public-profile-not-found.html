<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Perfil não encontrado — SolibriProfile</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-inner">
        <a th:href="@{/}" class="nav-brand">Solibri<span>Profile</span></a>
    </div>
</nav>
<main class="page-wrapper" style="text-align:center;padding-top:4rem;">
    <h1 class="page-title">Perfil não encontrado</h1>
    <p class="text-muted mt-1">
        O usuário <strong th:text="${username}"></strong> não possui um currículo público ou optou por mantê-lo privado.
    </p>
    <a th:href="@{/}" class="btn btn-primary mt-2">Voltar ao início</a>
</main>
<footer class="footer">
    <div class="footer-inner">
        <p class="footer-brand">Solibri<span>Profile</span></p>
    </div>
</footer>
</body>
</html>
