<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Entrar')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="auth-page">
    <div class="auth-card">
        <h1>Bem-vindo de volta</h1>
        <p class="subtitle">Entre na sua conta para continuar</p>

        <div th:replace="~{fragments/layout :: flash}"></div>

        <form th:action="@{/auth/login}" method="post">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input id="username" class="form-input" type="text"
                       name="username" autocomplete="username"
                       placeholder="seu-usuario" required/>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input id="password" class="form-input" type="password"
                       name="password" autocomplete="current-password"
                       placeholder="••••••••" required/>
            </div>

            <button type="submit" class="btn btn-primary btn-full mt-2">Entrar</button>
        </form>

        <p class="auth-footer mt-2">
            Não tem conta? <a th:href="@{/register}">Cadastre-se gratuitamente</a>
        </p>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
